// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.9.1'
        classpath 'com.google.gms:google-services:4.4.0'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.21'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Redirect all build output to ~/Library/Caches so iCloud Drive (which
    // syncs ~/Desktop) cannot create " 2" conflict-copy files inside the
    // Capacitor plugin build dirs under node_modules/. Without this, D8/dex
    // sees duplicate classes like "Keyboard$1 2.class" and fails the merge.
    buildDir = new File(
        System.getProperty("user.home"),
        "Library/Caches/kindred-gradle/${rootProject.name}/${project.name}"
    )
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
