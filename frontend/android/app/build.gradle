apply plugin: 'com.android.application'

// Read versionCode from version.properties (auto-incremented after each release build)
def versionPropsFile = file('version.properties')
def autoVersionCode = 1
if (versionPropsFile.exists()) {
    def versionProps = new Properties()
    versionPropsFile.withInputStream { versionProps.load(it) }
    autoVersionCode = (versionProps['VERSION_CODE'] ?: '1').toInteger()
} else {
    def versionProps = new Properties()
    versionProps['VERSION_CODE'] = autoVersionCode.toString()
    versionPropsFile.withWriter { versionProps.store(it, null) }
}

android {
    namespace "com.ubuntumarket.kindred"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.ubuntumarket.kindred"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode autoVersionCode
        versionName "2.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64'
        }
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    signingConfigs {
        release {
            def keystoreProperties = new Properties()
            def keystorePropertiesFile = rootProject.file('keystore.properties')
            if (keystorePropertiesFile.exists()) {
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
            }
            storeFile file(keystoreProperties['storeFile'] ?: '../kindred-release.keystore')
            storePassword keystoreProperties['storePassword'] ?: ''
            keyAlias keystoreProperties['keyAlias'] ?: 'kindred'
            keyPassword keystoreProperties['keyPassword'] ?: ''
        }
    }

buildTypes {
    release {
        signingConfig signingConfigs.release
        minifyEnabled false
        proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
    }
}
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

configurations.all {
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

// Auto-increment versionCode after a successful release build (bundleRelease or assembleRelease).
// Debug builds do NOT bump the number, so day-to-day dev work doesn't burn through codes.
afterEvaluate {
    tasks.matching { it.name == 'bundleRelease' || it.name == 'assembleRelease' }.configureEach { task ->
        task.doLast {
            def props = new Properties()
            versionPropsFile.withInputStream { props.load(it) }
            def current = (props['VERSION_CODE'] ?: '1').toInteger()
            def next = current + 1
            props['VERSION_CODE'] = next.toString()
            versionPropsFile.withWriter { props.store(it, null) }
            println "==> versionCode bumped: ${current} -> ${next} (next release build will use ${next})"
        }
    }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception ignored) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}