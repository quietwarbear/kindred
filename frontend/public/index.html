<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#1a1a2e" />
        <meta name="description" content="Kindred is a private home for families, churches, and intentional communities — gathering, memory, and contributions, without ads or public profiles." />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Kindred" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <link rel="canonical" href="https://www.heykindred.org/" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>Kindred — A private home for your community</title>

        <!-- Open Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:site_name" content="Kindred" />
        <meta property="og:title" content="Kindred — A private home for your community" />
        <meta property="og:description" content="Kindred is a private home for families, churches, and intentional communities — gathering, memory, and contributions, without ads or public profiles." />
        <meta property="og:url" content="https://www.heykindred.org/" />
        <meta property="og:image" content="https://www.heykindred.org/og-image.png" />
        <meta property="og:image:width" content="1080" />
        <meta property="og:image:height" content="1080" />

        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Kindred — A private home for your community" />
        <meta name="twitter:description" content="Kindred is a private home for families, churches, and intentional communities — gathering, memory, and contributions, without ads or public profiles." />
        <meta name="twitter:image" content="https://www.heykindred.org/og-image.png" />
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <script src="https://accounts.google.com/gsi/client" async defer></script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
        <!-- PostHog analytics removed — was rendering a floating widget and had a broken init call -->
    </body>
</html>
